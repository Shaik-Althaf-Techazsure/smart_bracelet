<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalAlign Pro | Clinical Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .data-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .pulse-ring { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 70% { transform: scale(1); opacity: 0; } 100% { transform: scale(0.95); opacity: 0; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-blue-200 animate__animated animate__pulse animate__infinite">D</div>
                <div>
                    <h1 class="text-lg font-bold leading-tight tracking-tight">DentalAlign <span class="text-blue-600">Pro</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Advanced Orthodontic RPM</p>
                </div>
            </div>
            <div class="flex items-center gap-3 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100 shadow-sm">
                <div class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
                </div>
                <span class="text-[10px] font-black uppercase tracking-tighter text-emerald-600">Live: Smart Bracelet Active</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8 max-w-6xl">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            
            <div class="glass-card p-8 rounded-[2.5rem] border border-white shadow-xl shadow-slate-200/60 animate__animated animate__fadeInLeft">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Mandibular Gap (A)</span>
                    <span class="px-2 py-1 bg-blue-50 text-blue-600 text-[9px] font-black rounded uppercase tracking-tighter">Real-Time Sync</span>
                </div>
                <div class="flex items-baseline gap-2 mb-6">
                    <span id="val1" class="text-8xl font-black text-slate-800 data-glow tracking-tighter">0.0</span>
                    <span class="text-2xl font-bold text-slate-300 italic">mm</span>
                </div>
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden p-0.5">
                    <div id="bar1" class="bg-gradient-to-r from-blue-400 to-blue-600 h-full rounded-full transition-all duration-1000"></div>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] border border-white shadow-xl shadow-slate-200/60 animate__animated animate__fadeInRight">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Maxillary Shift (B)</span>
                    <span class="px-2 py-1 bg-emerald-50 text-emerald-600 text-[9px] font-black rounded uppercase tracking-tighter">Cloud Verified</span>
                </div>
                <div class="flex items-baseline gap-2 mb-6">
                    <span id="val2" class="text-8xl font-black text-slate-800 data-glow tracking-tighter">0.0</span>
                    <span class="text-2xl font-bold text-slate-300 italic">mm</span>
                </div>
                <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden p-0.5">
                    <div id="bar2" class="bg-gradient-to-r from-emerald-400 to-emerald-600 h-full rounded-full transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-[0.3em] mb-8 flex items-center gap-3">
                <div class="w-1.5 h-6 bg-blue-600 rounded-full"></div>
                History Log: 24h Monitoring Trend
            </h3>
            <div class="h-[350px]">
                <canvas id="clinicalChart"></canvas>
            </div>
        </div>

    </main>

    <script>
        // --- CHART CONFIGURATION ---
        const ctx = document.getElementById('clinicalChart').getContext('2d');
        const clinicalChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Zone A', borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.05)', data: [], borderWidth: 4, tension: 0.4, fill: true, pointRadius: 0 },
                    { label: 'Zone B', borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.05)', data: [], borderWidth: 4, tension: 0.4, fill: true, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { beginAtZero: true, max: 4, grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold' } } },
                    x: { display: false }
                },
                plugins: { legend: { display: false } }
            }
        });

        // --- SMART SIMULATION LOGIC ---
        // This simulates a live dental patient breathing and jaw movement
        let baseA = 1.2;
        let baseB = 0.8;

        function updateData() {
            // Add subtle random movement (drift)
            baseA += (Math.random() - 0.5) * 0.2;
            baseB += (Math.random() - 0.5) * 0.15;

            // Keep within realistic dental range (0.4mm to 3.2mm)
            baseA = Math.max(0.4, Math.min(3.2, baseA));
            baseB = Math.max(0.4, Math.min(2.8, baseB));

            // Display values
            const s1 = baseA.toFixed(1);
            const s2 = baseB.toFixed(1);

            document.getElementById('val1').innerText = s1;
            document.getElementById('val2').innerText = s2;
            
            // Progress Bar Logic
            document.getElementById('bar1').style.width = (baseA / 4 * 100) + "%";
            document.getElementById('bar2').style.width = (baseB / 4 * 100) + "%";

            // Update Chart
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            if (clinicalChart.data.labels.length > 25) {
                clinicalChart.data.labels.shift();
                clinicalChart.data.datasets[0].data.shift();
                clinicalChart.data.datasets[1].data.shift();
            }
            clinicalChart.data.labels.push(now);
            clinicalChart.data.datasets[0].data.push(baseA);
            clinicalChart.data.datasets[1].data.push(baseB);
            clinicalChart.update('none');
        }

        // Run update every 1.5 seconds for a professional look
        setInterval(updateData, 1500);
        updateData(); // Initial run
    </script>
</body>
</html>
