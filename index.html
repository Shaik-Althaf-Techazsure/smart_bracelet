<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalAlign Pro | Smart Bracelet</title>
    <!-- CSS Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <!-- Header Section -->
    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">D</div>
                <h1 class="text-xl font-bold tracking-tight text-slate-800">Dental<span class="text-blue-600">Align</span></h1>
            </div>
            <div id="connection-status" class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest text-slate-500 transition-all">
                <span id="status-dot" class="w-2 h-2 bg-slate-400 rounded-full"></span>
                <span id="status-text">Attempting Connection...</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-8 max-w-6xl">
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            
            <!-- Sensor 1 Card -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 animate__animated animate__fadeInUp">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Gap Sensor A</p>
                    <span class="text-blue-600 bg-blue-50 px-2 py-1 rounded text-[10px] font-bold">INDEX</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="val1" class="text-5xl font-black text-slate-800">0.0</span>
                    <span class="text-slate-400 font-medium italic">mm</span>
                </div>
                <div class="mt-6">
                    <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-400">
                        <span>MIN</span><span>OPTIMAL</span><span>MAX</span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden border border-slate-50">
                        <div id="bar1" class="bg-blue-500 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Sensor 2 Card -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 animate__animated animate__fadeInUp" style="animate-delay: 0.1s">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Gap Sensor B</p>
                    <span class="text-emerald-600 bg-emerald-50 px-2 py-1 rounded text-[10px] font-bold">MIDDLE</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="val2" class="text-5xl font-black text-slate-800">0.0</span>
                    <span class="text-slate-400 font-medium italic">mm</span>
                </div>
                <div class="mt-6">
                    <div class="flex justify-between text-[10px] mb-1 font-bold text-slate-400">
                        <span>MIN</span><span>OPTIMAL</span><span>MAX</span>
                    </div>
                    <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden border border-slate-50">
                        <div id="bar2" class="bg-emerald-500 h-full transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- System Info Card -->
            <div class="bg-blue-600 p-6 rounded-3xl shadow-lg shadow-blue-200 text-white animate__animated animate__fadeInUp" style="animate-delay: 0.2s">
                <h3 class="font-bold mb-2">Device Diagnostic</h3>
                <div class="space-y-3 text-sm opacity-90">
                    <div class="flex justify-between border-b border-blue-500 pb-2">
                        <span>Protocol</span><span class="font-mono">MQTT/WSS</span>
                    </div>
                    <div class="flex justify-between border-b border-blue-500 pb-2">
                        <span>Hardware</span><span class="font-mono">ESP32-C3</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Frequency</span><span class="font-mono">2.4GHz WiFi</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="mt-4 w-full bg-white text-blue-600 font-bold py-2 rounded-xl text-xs hover:bg-blue-50 transition-colors">RECONNECT SYSTEM</button>
            </div>
        </div>

        <!-- Live Chart Section -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8 overflow-hidden animate__animated animate__fadeIn">
            <h3 class="text-slate-800 font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                Real-Time Adjustment Analytics
            </h3>
            <div class="h-[300px]">
                <canvas id="liveChart"></canvas>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        // CRITICAL: Must match your ESP32 Topic exactly
        const TOPIC = "dental/align/monitor/unique123"; 
        const BROKER = "broker.hivemq.com";
        const PORT = 8884; // Secure Port for GitHub Pages

        // --- CHART SETUP ---
        const ctx = document.getElementById('liveChart').getContext('2d');
        const liveChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Sensor A (mm)',
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        data: [],
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    },
                    {
                        label: 'Sensor B (mm)',
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        data: [],
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } },
                scales: {
                    y: { beginAtZero: true, max: 5, grid: { color: '#f1f5f9' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // --- MQTT CLIENT ---
        const client = new Paho.MQTT.Client(BROKER, PORT, "web_client_" + Math.random().toString(16).substr(2, 5));

        client.onMessageArrived = (msg) => {
            try {
                const data = JSON.parse(msg.payloadString);
                
                // Update Numeric Display
                document.getElementById('val1').innerText = data.s1.toFixed(1);
                document.getElementById('val2').innerText = data.s2.toFixed(1);
                
                // Update Bars (Assumes 5mm max)
                document.getElementById('bar1').style.width = (data.s1 * 20) + "%";
                document.getElementById('bar2').style.width = (data.s2 * 20) + "%";

                // Update Chart
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                if (liveChart.data.labels.length > 20) {
                    liveChart.data.labels.shift();
                    liveChart.data.datasets[0].data.shift();
                    liveChart.data.datasets[1].data.shift();
                }
                liveChart.data.labels.push(now);
                liveChart.data.datasets[0].data.push(data.s1);
                liveChart.data.datasets[1].data.push(data.s2);
                liveChart.update('none'); // Update without animation for performance

            } catch (e) { console.error("Data Error:", e); }
        };

        client.onConnectionLost = (resp) => {
            updateStatus(false, "Connection Lost");
            setTimeout(doConnect, 5000); // Auto reconnect
        };

        function updateStatus(connected, text) {
            const dot = document.getElementById('status-dot');
            const box = document.getElementById('connection-status');
            const label = document.getElementById('status-text');

            if(connected) {
                dot.className = "w-2 h-2 bg-emerald-500 rounded-full animate-pulse";
                box.className = "flex items-center gap-2 bg-emerald-50 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest text-emerald-600 border border-emerald-100 shadow-sm";
                label.innerText = "Live: Monitoring";
            } else {
                dot.className = "w-2 h-2 bg-red-500 rounded-full";
                box.className = "flex items-center gap-2 bg-red-50 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest text-red-600 border border-red-100 shadow-sm";
                label.innerText = text;
            }
        }

        function doConnect() {
            client.connect({
                useSSL: true,
                onSuccess: () => {
                    updateStatus(true);
                    client.subscribe(TOPIC);
                },
                onFailure: (e) => {
                    updateStatus(false, "Broker Offline");
                    console.log(e);
                }
            });
        }

        doConnect();
    </script>
</body>
</html>
